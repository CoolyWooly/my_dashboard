services:
  dashboard:
    build: .
    container_name: docker-dashboard
    restart: unless-stopped
    ports:
      # Наружу на порт 9000. Доступ защищён basic-авторизацией (DASH_USER/DASH_PASS).
      - "9000:3000"
    volumes:
      # Доступ к Docker socket для чтения статуса/логов/метрик и управления.
      - /var/run/docker.sock:/var/run/docker.sock
    # Логин/пароль берутся из файла .env рядом с этим compose (не в git).
    # required: false — без .env дашборд просто стартует без авторизации.
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=3000
