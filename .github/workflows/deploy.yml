name: Deploy to server

# Автодеплой при пуше в main.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # ручной запуск из вкладки Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            DIR="${{ secrets.DEPLOY_PATH }}"
            DIR="${DIR:-/opt/my_dashboard}"

            # Первый деплой — клонируем, дальше — обновляем.
            if [ ! -d "$DIR/.git" ]; then
              git clone git@github.com:CoolyWooly/my_dashboard.git "$DIR"
            fi

            cd "$DIR"
            git fetch --all
            git reset --hard origin/main

            # Пересборка и перезапуск только этого сервиса.
            docker compose up -d --build
            docker image prune -f
