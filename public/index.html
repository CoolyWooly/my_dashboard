<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docker Dashboard</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐳</text></svg>"
    />
  </head>
  <body>
    <header>
      <h1>🐳 Docker Dashboard</h1>
      <div class="host-meta">
        <span id="hostname">—</span>
        <span id="os-info" class="muted"></span>
        <span id="uptime" class="muted"></span>
        <span id="conn" class="dot" title="Соединение"></span>
      </div>
    </header>

    <!-- Метрики хоста -->
    <section class="host-stats">
      <div class="stat-card">
        <div class="stat-label">CPU хоста</div>
        <div class="stat-value"><span id="host-cpu">—</span>%</div>
        <div class="bar"><div id="host-cpu-bar" class="bar-fill"></div></div>
        <div class="stat-sub" id="host-cpu-sub"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">RAM хоста</div>
        <div class="stat-value"><span id="host-mem">—</span>%</div>
        <div class="bar"><div id="host-mem-bar" class="bar-fill"></div></div>
        <div class="stat-sub" id="host-mem-sub"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Диск /</div>
        <div class="stat-value"><span id="host-disk">—</span>%</div>
        <div class="bar"><div id="host-disk-bar" class="bar-fill"></div></div>
        <div class="stat-sub" id="host-disk-sub"></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Контейнеры</div>
        <div class="stat-value">
          <span id="cnt-running">0</span
          ><span class="muted">/<span id="cnt-total">0</span></span>
        </div>
        <div class="stat-sub">запущено / всего</div>
      </div>
    </section>

    <!-- Список контейнеров -->
    <main>
      <table class="containers">
        <thead>
          <tr>
            <th></th>
            <th>Имя</th>
            <th>Образ</th>
            <th>Статус</th>
            <th>CPU</th>
            <th>RAM</th>
            <th>Сеть ↓ / ↑</th>
            <th>Порты</th>
            <th>Действия</th>
          </tr>
        </thead>
        <tbody id="containers-body">
          <tr>
            <td colspan="9" class="muted center">Загрузка…</td>
          </tr>
        </tbody>
      </table>
    </main>

    <!-- Панель логов -->
    <div id="logs-panel" class="logs-panel hidden">
      <div class="logs-header">
        <span>Логи: <strong id="logs-title"></strong></span>
        <div>
          <button id="logs-clear" class="btn btn-sm">Очистить</button>
          <button id="logs-close" class="btn btn-sm">✕</button>
        </div>
      </div>
      <pre id="logs-output"></pre>
    </div>

    <script src="app.js"></script>
  </body>
</html>
